baseURL = "https://YuanxinGuo.github.io/audio-paper-daily/"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
title = "语音/音频论文速递"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
pagination.pagerSize = 15

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  description = "每日自动抓取 arxiv / HuggingFace 最新语音/音频 AI 论文，DeepSeek 深度分析后发布"
  author = "YuanxinGuo"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowRssButtonInSectionTermList = true
  DateFormat = "2006-01-02"
  disableSpecial1stPost = true
  hideMeta = false
  assets.disableHLJS = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/YuanxinGuo/audio-paper-daily"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 10
  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    name = "排行榜"
    url = "/rankings/"
    weight = 30
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 40

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "github"
